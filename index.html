<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Content Security Policy: whitelists exactly what the app legitimately
         loads — Telegram's SDK, Google Fonts, same-origin scripts/styles, the
         video-embed providers and the ipify geo lookup. Blocks injected
         <script> from any other origin (the main XSS defence). 'unsafe-inline'
         is needed for styles only (Tailwind + React inline style props); no
         inline scripts are used. Keep frame-src in sync with new embed
         providers added to getVideoEmbed(). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://api.ipify.org; worker-src 'self' blob:; frame-src https://www.youtube.com https://youtube.com https://rutube.ru https://player.twitch.tv https://clips.twitch.tv https://vk.com https://vkvideo.ru; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <title>OptionsData — Digital Library</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="theme-color" content="#F5312B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="OptionsData" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
