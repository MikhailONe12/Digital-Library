server {
    listen 80;
    listen [::]:80;
    server_name library.optionsdata.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name library.optionsdata.ru;

    ssl_certificate /etc/letsencrypt/live/library.optionsdata.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/library.optionsdata.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Лимит для загрузки файлов (видео до 1 ГБ)
    client_max_body_size 1G;

    root /mnt/library/app/dist;
    index index.html;

    # Фронтенд (React SPA)
    location / {
        try_files $uri /index.html;
    }

    # ES-модули (.mjs) и WebAssembly (.wasm): стандартный mime.types в nginx
    # может не содержать эти расширения — браузер тогда отклоняет модуль
    # ("Failed to fetch dynamically imported module") или не инициализирует
    # WASM. Принудительно задаём корректные типы (нужно для воркера и
    # декодеров изображений pdf.js).
    location ~* \.(mjs|wasm)$ {
        types {
            text/javascript  mjs;
            application/wasm  wasm;
        }
    }

    # API — проксируем на Express (порт 3001)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Стримим большие загрузки (видео до 1 ГБ) напрямую в backend
        proxy_request_buffering off;
    }

    # Статические файлы контента — Nginx проверяет блеклист через Express
    location /content/ {
        auth_request /api/check-access;
        alias   /mnt/library/content/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Внутренний location для X-Accel-Redirect (защищённые файлы через /api/file/)
    location /internal-content/ {
        internal;
        alias /mnt/library/content/;
        expires 1h;
        add_header Cache-Control "private";
    }

    add_header X-Frame-Options "ALLOWALL";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
