server {
    listen 80;
    listen [::]:80;
    server_name library.optionsdata.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name library.optionsdata.ru;

    ssl_certificate /etc/letsencrypt/live/library.optionsdata.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/library.optionsdata.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /mnt/library/app/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # API - раскомментировать когда будет backend
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3001;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Файлы книг — внешний прямой доступ закрыт
    location /protected-files/ {
        internal;
        alias /mnt/library/files/;
    }

    add_header X-Frame-Options "ALLOWALL";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
